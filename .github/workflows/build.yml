name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      DALAMUD_HOME: ${{ runner.temp }}\dalamud
      IsCI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud API
        shell: pwsh
        run: |
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile $env:RUNNER_TEMP\dalamud.zip
          Expand-Archive $env:RUNNER_TEMP\dalamud.zip -DestinationPath $env:DALAMUD_HOME

      - name: Build release
        run: dotnet build Meddle.sln -c Release --nologo

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: XivBlend.Plugin-${{ github.sha }}
          path: Meddle/Meddle.Plugin/bin/**/XivBlend.Plugin/latest.zip
          if-no-files-found: error
