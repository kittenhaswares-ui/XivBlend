name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      IsCI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud API
        shell: pwsh
        run: |
          $dalamudHome = Join-Path $env:RUNNER_TEMP 'dalamud'
          $dalamudArchive = Join-Path $env:RUNNER_TEMP 'dalamud.zip'
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile $dalamudArchive
          Expand-Archive $dalamudArchive -DestinationPath $dalamudHome
          "DALAMUD_HOME=$dalamudHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release
        run: dotnet build Meddle.sln -c Release --nologo

      - name: Run bounded parser and custom-manifest tests
        run: dotnet run --project Meddle/Meddle.Utils.Tests/Meddle.Utils.Tests.csproj -c Release --no-build

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: XivBlend.Plugin-${{ github.sha }}
          path: Meddle/Meddle.Plugin/bin/**/XivBlend.Plugin/latest.zip
          if-no-files-found: error
